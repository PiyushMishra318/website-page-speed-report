<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Speed Report</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1>Website Page Speed Report</h1>
      <p>Google PageSpeed Insights for any URL — desktop and mobile.</p>
    </div>
  </header>

  <main class="main">
    <section class="card card--form">
      <form id="form" class="form">
        <label class="form__label" for="url">Page URL</label>
        <div class="form__row">
          <input
            id="url"
            class="form__input"
            type="url"
            required
            placeholder="https://example.com/"
            autocomplete="url"
          />
          <button id="submit" class="btn" type="submit">Analyze</button>
        </div>
      </form>
    </section>

    <div id="status" class="status" hidden aria-live="polite"></div>
    <div id="results" class="results" hidden></div>
  </main>

  <footer class="footer">
    <p>MIT © 2026 · <a href="https://piyushm.dev">piyushm.dev</a> · <a href="mailto:piyush_mishra31@outlook.com">piyush_mishra31@outlook.com</a> · Google PageSpeed Insights</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
