<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Speed Report</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="theme-speed">
  <div class="bg-animation" aria-hidden="true"></div>
  <header class="header">
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme" title="Toggle theme"><span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">&#9728;</span><span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">&#9789;</span></button>
    <div class="header__inner">
      <h1>Website Page Speed Report</h1>
      <p>Google PageSpeed Insights for any URL — desktop and mobile.</p>
    
      <a class="header__github" href="https://github.com/PiyushMishra318/website-page-speed-report" target="_blank" rel="noopener noreferrer">View on GitHub</a>
    </div>
  </header>

  <main class="page-main main">
    <section class="card card--form">
      <form id="form" class="form">
        <label class="form__label" for="url">Page URL</label>
        <div class="form__row">
          <input
            id="url"
            class="form__input"
            type="url"
            required
            placeholder="https://example.com/"
            autocomplete="url"
          />
          <button id="submit" class="btn" type="submit">Analyze</button>
        </div>
      </form>
    </section>

    <div id="status" class="status" hidden aria-live="polite"></div>
    <div id="results" class="results" hidden></div>
  </main>

  <footer class="site-footer footer">
    <p>MIT © 2026 · <a href="https://piyushm.dev">piyushm.dev</a> · <a href="https://github.com/PiyushMishra318/website-page-speed-report" target="_blank" rel="noopener noreferrer">View on GitHub</a> · Google PageSpeed Insights</p>
  </footer>

  <script src="/app.js"></script>
  <script src="/theme.js"></script>
</body>
</html>
